<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">{{ isEditMode ? 'Edit Project' : 'Add New Project' }}</h4>
        </div>
        <div class="card-body">
          <form (ngSubmit)="saveProject()">
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="title" class="form-label">Title *</label>
                  <input type="text" class="form-control" id="title" [(ngModel)]="projectForm.title" name="title" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="image" class="form-label">Image *</label>
                  <input type="file" class="form-control" id="image" (change)="onFileSelected($event)" accept="image/*">
                  <div id="start" class="mt-2 text-muted">Select an image file</div>
                  <img id="file-image" class="mt-2 hidden" style="max-width: 200px; max-height: 200px;" alt="Preview">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-12">
                <div class="mb-3">
                  <label for="content" class="form-label">Content *</label>
                  <angular-editor [(ngModel)]="projectForm.content" name="content" [config]="editorConfig"></angular-editor>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3 form-check">
                  <input type="checkbox" class="form-check-input" id="isPublished" [(ngModel)]="projectForm.isPublished" name="isPublished">
                  <label class="form-check-label" for="isPublished">Published</label>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-12">
                <button type="submit" class="btn btn-primary me-2">{{ isEditMode ? 'Update' : 'Save' }}</button>
                <button type="button" class="btn btn-secondary" (click)="goBack()">Cancel</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast Message -->
<div *ngIf="toastMessage" class="toast-container position-fixed top-0 end-0 p-3">
  <div class="toast show" [class.bg-success]="toastType === 'success'" [class.bg-danger]="toastType === 'error'">
    <div class="toast-body text-white">
      {{ toastMessage }}
    </div>
  </div>
</div>
